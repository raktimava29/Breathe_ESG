services:
  - type: web
    name: breathe-esg-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python manage.py migrate && python manage.py seed_demo && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-ui.onrender.com"
      - key: PYTHONPATH
        value: backend
      - key: DB_SSL_REQUIRE
        value: "true"

  - type: web
    name: breathe-esg-ui
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: "https://breathe-esg-api.onrender.com/api"

databases:
  - name: breathe-esg-db
    plan: free
